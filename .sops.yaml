# SOPS configuration for Ateles secrets.
#
# Architecture (Design B — see docs/secrets_management.md):
#   1Password is the CANONICAL store of secret values.
#   This repo holds an ENCRYPTED snapshot (secrets/*.sops.env) so daemons, CI,
#   and other machines can read secrets OFFLINE without a live 1Password session.
#   SOPS encrypts with `age`; the age PRIVATE key is itself stored in 1Password
#   and pulled onto each machine once at bootstrap.
#
# SETUP: replace the placeholder recipient below with your real age PUBLIC key
# (the `age1...` line printed by `age-keygen`), then re-key any existing files:
#   sops updatekeys secrets/neotoma.sops.env
#
# The public key is safe to commit — it can only ENCRYPT. Only the private key
# (kept in 1Password) can decrypt.

creation_rules:
  - path_regex: secrets/.*\.sops\.env$
    # >>> REPLACE THIS PLACEHOLDER WITH YOUR REAL age PUBLIC KEY <<<
    age: age1enj69yw7dmhmh0ulrs02zz0c846xhqudj6nae2kun2mknu0vp5uqun8njy
