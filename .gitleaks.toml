title = "Personal Repository Secrets Detection"

[extend]
useDefault = true

[[rules]]
id = "env-files"
description = "Detect .env files"
regex = '''\.env'''
path = '''\.env.*'''

[[rules]]
id = "protected-patterns"
description = "Detect secrets, credentials patterns"
regex = '''(?i)(secret|credential|password|api[_-]?key|private[_-]?key|access[_-]?token|bearer[_-]?token)'''
tags = ["secret", "credential"]

[[rules]]
id = "aws-keys"
description = "AWS access keys"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "private-keys"
description = "Private keys (RSA, DSA, EC)"
regex = '''-----BEGIN (RSA|DSA|EC) PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "github-tokens"
description = "GitHub tokens"
regex = '''ghp_[a-zA-Z0-9]{36}'''
tags = ["github", "token"]

