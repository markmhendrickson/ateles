title = "Personal Repository Secrets Detection"

[extend]
useDefault = true

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot API token"
regex = '''\b\d{8,10}:[A-Za-z0-9_-]{35}\b'''
tags = ["telegram", "token"]

[[rules]]
id = "env-files"
description = "Detect .env files"
regex = '''\.env'''
path = '''\.env.*'''

[[rules]]
id = "protected-patterns"
description = "Detect hardcoded credentials assigned to variables"
regex = '''(?i)(secret|credential|password|api[_-]?key|private[_-]?key|access[_-]?token|bearer[_-]?token)\s*[:=]\s*['"][^'"]{8,}['"]'''
tags = ["secret", "credential"]

[[rules]]
id = "aws-keys"
description = "AWS access keys"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "private-keys"
description = "Private keys (RSA, DSA, EC)"
regex = '''-----BEGIN (RSA|DSA|EC) PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "github-tokens"
description = "GitHub tokens"
regex = '''ghp_[a-zA-Z0-9]{36}'''
tags = ["github", "token"]

# ============================================================================
# PII detection rules — STRUCTURAL (match the shape of personal data, not
# specific known values). These exist because this repo is PUBLIC and content
# is migrated in from private sources. They catch NEW PII (a contact we've
# never seen) by its format, not a marker list. Tune false positives via the
# [allowlist] regexes/paths below, NOT by weakening these rules.
# ============================================================================

[[rules]]
id = "pii-email"
description = "PII: email address (real person/contact). Allowlist placeholders + operator + vendors below."
regex = '''(?i)\b[a-z0-9._%+-]+@(?:[a-z0-9-]+\.)+[a-z]{2,}\b'''
tags = ["pii", "email"]

[[rules]]
id = "pii-phone-intl"
description = "PII: international phone number (E.164-ish, + country code)"
regex = '''\+[0-9](?:[ .-]?[0-9]){8,14}\b'''
tags = ["pii", "phone"]

[[rules]]
id = "pii-iban"
description = "PII: IBAN (international bank account number)"
regex = '''\b[A-Z]{2}[0-9]{2}(?:[ ]?[A-Z0-9]{4}){3,7}(?:[ ]?[A-Z0-9]{1,3})?\b'''
tags = ["pii", "financial", "iban"]

[[rules]]
id = "pii-spanish-nie-nif"
description = "PII: Spanish NIE/NIF/DNI national identifier"
regex = '''\b(?:[XYZ][0-9]{7}[A-Z]|[0-9]{8}[A-Z])\b'''
tags = ["pii", "national-id", "spain"]

[[rules]]
id = "pii-us-ssn"
description = "PII: US Social Security Number"
regex = '''\b[0-9]{3}-[0-9]{2}-[0-9]{4}\b'''
tags = ["pii", "national-id", "us"]

# NOTE: a bare "13-19 digit" credit-card rule was evaluated and removed — it
# cannot do Luhn validation in RE2 and matched timestamps/date-IDs/order
# numbers with ~210 false positives. Structured financial PII is covered by
# pii-iban; true card numbers, if ever needed, should be added with a tightly
# anchored, context-prefixed rule instead.

# Allowlist: env var names in code (not actual secrets)
[allowlist]
description = "Env var names and common words in code (not real secrets); PII false-positive exceptions"
# Regex allowlist for the structural PII rules: placeholder/example values,
# the operator's own identifiers, vendor automation addresses, and doc
# conventions. Add NEW genuine-but-safe values here rather than weakening the
# pii-* rules. A real third-party contact's email/phone/ID will NOT match
# these and will correctly trip the scan.
regexes = [
  # placeholder / documentation emails
  '''(?i)\b[a-z0-9._%+-]+@(?:example\.(?:com|org|net)|test\.com|email\.com|domain\.(?:com|tld)|company\.com|yourdomain\.com)\b''',
  # RFC 6761 reserved TLDs — synthetic test fixtures + synthetic Message-IDs
  # (e.g. swarm@d.test, op@x.test, <run-ent_abc-created-0@d.test>). These TLDs
  # can never resolve to a real address, so they are never real PII. The trailing
  # [^a-z0-9.-]/$ anchors the reserved label as the FINAL one (so a real address
  # like x@test.company.com is NOT allowlisted) — RE2-safe, no lookahead.
  '''(?i)\b[a-z0-9._%+-]+@(?:[a-z0-9-]+\.)*(?:test|example|invalid|localhost)(?:[^a-z0-9.-]|$)''',
  '''(?i)\b(?:your|user|name|email|me|someone|admin|test|foo|bar|john\.doe|jane\.doe|noreply|no-reply|donotreply)@''',
  # operator's own identity + own domain (the repo owner & their agents —
  # not third-party PII). e.g. mark@/cursor@/ateles-agent@markmhendrickson.com
  '''(?i)\bmarkmhendrickson(?:\+[a-z0-9._-]+)?@gmail\.com\b''',
  '''(?i)@markmhendrickson\.com\b''',
  '''(?i)@users\.noreply\.github\.com\b''',
  # tooling / vendor automation addresses (not personal contacts)
  '''(?i)\b(?:noreply|no-reply|support|hello|notifications?|billing|security|abuse)@(?:github\.com|anthropic\.com|amazon\.[a-z]+|google\.com|cloudflare\.com|stripe\.com)\b''',
  '''(?i)\b(?:auto-confirm|order-update|ship-confirm)@amazon\.[a-z]+\b''',
  # Google Calendar resource IDs (look like emails but are service identifiers)
  '''@group\.calendar\.google\.com\b''',
  '''@(?:group\.v\.calendar|import\.calendar)\.google\.com\b''',
  # git author trailer used in commits
  '''Co-Authored-By:.*@''',
  # placeholder phone numbers in docs/examples (sequential or repeated digits)
  '''\+?1234567890\b''',
  '''\+?0{7,}\b''',
  '''\+1[ -]?555[ -]?''',
  # IBAN/card false positives: documentation placeholders (all-X, all-zero,
  # or sequential example numbers)
  '''\bES[0-9]{2}(?:[ ]?(?:X{4}|0{4}|1234))''',
  '''\b(?:0000[ -]?){3,}''',
  '''\bXXX[X-]''',
]
