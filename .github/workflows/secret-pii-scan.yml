name: Secret & PII Scan

# Boundary guard: this repository is PUBLIC and content is sometimes migrated
# in from private sources. Every push and PR is scanned with gitleaks using
# the rules in .gitleaks.toml — which include STRUCTURAL PII detection
# (emails, phones, IBANs, national IDs, cards), not just secrets. A finding
# fails the check, blocking the content from reaching a public branch.
#
# Tune false positives in .gitleaks.toml's [allowlist] (regexes/paths), never
# by disabling this workflow.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets + PII)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # scan full history on the ref, not just the tip

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # For PRs, scan the diff range; for pushes, scan the new commits.
          # gitleaks-action handles this automatically from the event.
        # No GITLEAKS_LICENSE needed for public repos / individual use.
