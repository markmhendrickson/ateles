[pytest]
# Pytest configuration for parquet MCP server tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (slower, may use real files/databases)
    slow: Tests that take a long time to run

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage (if pytest-cov is installed)
# addopts = --cov=. --cov-report=term-missing --cov-report=html

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/test_run.log
log_file_level = DEBUG

# Minimum Python version
minversion = 3.9
